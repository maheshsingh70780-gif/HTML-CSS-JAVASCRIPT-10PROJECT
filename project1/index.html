<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Life Timer</title>

    <link rel="stylesheet" href="styles.css">
    <link rel="icon" href="image.jpg.jpeg">
    <link rel="stylesheet"
        href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css">
</head>
<body>

<div class="background">

    <div id="initialText" class="container">
        <h1>Kindly Enter Your Date Of Birth</h1>
    </div>

    <div id="afterDOBBtnTxt" class="container hide">

        <h1>How Much Life Journey Covered Till Now</h1>

        <div class="time-container">

            <div class="box">
                <span id="year">0</span>
                <p>Years</p>
            </div>

            <div class="box">
                <span id="month">0</span>
                <p>Months</p>
            </div>

            <div class="box">
                <span id="day">0</span>
                <p>Days</p>
            </div>

            <div class="box">
                <span id="hour">0</span>
                <p>Hours</p>
            </div>

            <div class="box">
                <span id="minute">0</span>
                <p>Minutes</p>
            </div>

            <div class="box">
                <span id="second">0</span>
                <p>Seconds</p>
            </div>

        </div>

    </div>

    <div class="settings">

        <i id="settingIcon" class="fa-solid fa-gear"></i>

        <div id="settingContent" class="settings-content hide">

            <input type="date" id="dobInput">

            <button id="dobButton">Add DOB</button>

        </div>

    </div>

</div>

<script src="index.js"></script>

</body>
</html>
